name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    name: Backend Lint, Test & Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: './Backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd Backend
          npm ci

      - name: Dependency Security Audit
        run: |
          cd Backend
          npm audit --audit-level=high || true

      - name: Run Backend Tests
        run: |
          cd Backend
          # npm test command runs here once tests are configured
          echo "Running backend test checks..."

  frontend-checks:
    name: Frontend Lint & Build Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: './Frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd Frontend
          npm ci

      - name: Validate TypeScript Compilation
        run: |
          cd Frontend
          npx tsc --noEmit

      - name: Build Frontend Application
        run: |
          cd Frontend
          npm run build
